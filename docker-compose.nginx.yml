services:
  rag-api-1:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./.index_cache:/app/.index_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  rag-api-2:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./.index_cache:/app/.index_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  rag-api-3:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./.index_cache:/app/.index_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  nginx:
    image: nginx:1.27-alpine
    container_name: sahrdaya-rag-nginx
    depends_on:
      rag-api-1:
        condition: service_healthy
      rag-api-2:
        condition: service_healthy
      rag-api-3:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/nginx.conf:ro
