services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sahrdaya-rag-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      - ./.index_cache:/app/.index_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s
